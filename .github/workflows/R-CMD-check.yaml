# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  custom-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        run: |
          Rscript -e 'install.packages("remotes")'
          Rscript -e 'remotes::install_cran("tidyverse", dependencies = TRUE)'
          Rscript -e 'remotes::install_cran("dplyr", dependencies = TRUE)'
          Rscript -e 'remotes::install_cran("devtools", dependencies = TRUE)'
          Rscript -e 'remotes::install_cran("pharmaversesdtm", dependencies = TRUE)'

      - name: Run custom R script
        run: |
          Rscript R/data_cleaning.R
          Rscript R/analysis.R